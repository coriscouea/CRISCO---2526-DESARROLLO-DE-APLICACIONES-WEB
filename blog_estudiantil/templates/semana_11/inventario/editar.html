<!-- editar.html - Página para editar un artículo existente en el Blog Estudiantil -->
<!-- Hereda de base.html y muestra el formulario para modificar artículos -->

{% extends "semana_10/ediccion/base.html" %}
<!-- Extiende la plantilla base para heredar su estructura -->

{% block title %}Editar Artículo{% endblock %}
<!-- Define el título de la página en el navegador -->

{% block content %}
<!-- Inicio del bloque de contenido específico de esta página -->

<h2>Editar Artículo del Blog</h2>
<!-- Título de la página de edición -->

<p>Modifica la información del artículo seleccionado.</p>
<!-- Instrucciones para el usuario -->

<form method="POST">
<!-- Formulario que envía datos por método POST al servidor -->

    <div class="form-group">
    <!-- Contenedor del campo de ID (solo lectura) -->
        <label class="form-label" for="articulo_id">ID del Artículo:</label>
        <!-- Etiqueta del campo ID -->
        <input type="text" id="articulo_id" value="{{ articulo.id }}" readonly class="form-input" style="background-color: #f5f5f5;">
        <!-- Campo que muestra el ID del artículo (solo lectura) -->
    </div>

    <div class="form-group">
    <!-- Contenedor del campo de título -->
        <label class="form-label" for="titulo">Título del Artículo:</label>
        <!-- Etiqueta del campo título -->
        <input type="text" id="titulo" name="titulo" value="{{ articulo.titulo }}" class="form-input" required>
        <!-- Campo de texto para el título del artículo con valor actual -->
    </div>

    <div class="form-group">
    <!-- Contenedor del campo de contenido -->
        <label class="form-label" for="contenido">Contenido del Artículo:</label>
        <!-- Etiqueta del campo contenido -->
        <textarea id="contenido" name="contenido" class="form-textarea" rows="10" required>{{ articulo.contenido }}</textarea>
        <!-- Área de texto para el contenido con valor actual -->
    </div>

    <div class="form-group">
    <!-- Contenedor del botón de envío -->
        <input type="submit" value="Actualizar Artículo" class="btn-submit">
        <!-- Botón para guardar los cambios -->
    </div>

</form>
<!-- Fin del formulario -->

<div style="margin-top: 2rem;">
<!-- Contenedor con margen superior para los enlaces de navegación -->
    <a href="{{ url_for('ver_articulo', id=articulo.id) }}" class="btn">Ver Artículo</a>
    <!-- Enlace para ver el artículo -->
    <a href="{{ url_for('ver_blog') }}" class="btn">Volver al Blog</a>
    <!-- Enlace para regresar al blog -->
</div>

{% endblock %}
<!-- Fin del bloque de contenido -->
